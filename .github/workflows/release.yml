name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri App
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "MTCode v__VERSION__"
          releaseBody: |
            ## MTCode v__VERSION__

            ### Downloads
            | File | Description |
            |------|-------------|
            | `MTCode_*_x64-setup.exe` | Installer (recommended) |
            | `MTCode_*_Portable_x64.zip` | Portable — unzip and run, no install needed |

            ### Requirements
            - Windows 10 / 11 (x64)
            - Microsoft Edge WebView2 (pre-installed on Win10/11)

            ---
            _Built by GitHub Actions_
          releaseDraft: false
          prerelease: false

      - name: Create Portable ZIP
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).package.version
          $exePath = "src-tauri/target/release/mtcode.exe"
          $zipName = "MTCode_${version}_Portable_x64.zip"
          $tmpDir = "portable_tmp"
          New-Item -ItemType Directory -Force -Path $tmpDir | Out-Null
          Copy-Item $exePath "$tmpDir/MTCode.exe"
          Copy-Item "kill.bat" "$tmpDir/kill.bat"
          Compress-Archive -Path "$tmpDir/*" -DestinationPath $zipName -Force
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload Portable ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
