name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "MTCode v__VERSION__"
          releaseBody: |
            ## MTCode v__VERSION__

            ### Windows
            - **[Installer (.exe)](https://github.com/mtronape-tech/mtcode/releases/download/v__VERSION__/MTCode_v__VERSION___x64-setup.exe)** — NSIS installer (recommended)
            - **[Portable (.zip)](https://github.com/mtronape-tech/mtcode/releases/download/v__VERSION__/MTCode_v__VERSION___x64.zip)** — no install, just unzip and run

            ### Linux
            - **[.deb Package](https://github.com/mtronape-tech/mtcode/releases/download/v__VERSION__/mtcode__VERSION___amd64.deb)** — Debian/Ubuntu installer

            ### macOS
            - **[.dmg Disk Image](https://github.com/mtronape-tech/mtcode/releases/download/v__VERSION__/MTCode_v__VERSION___universal.dmg)** — drag to Applications

            ---
            _Auto-generated by GitHub Actions_
          releaseDraft: true
          prerelease: false
