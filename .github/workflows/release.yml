name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri App
        id: release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "MTCode v__VERSION__"
          releaseBody: |
            ## MTCode v__VERSION__

            ### Windows
            - **Installer (.exe)** — NSIS installer (Recommended)
            - **Portable (.zip)** — No install, unzip and run

            ### Linux
            - **.deb Package** — Debian/Ubuntu

            ### macOS
            - **.dmg Disk Image** — Drag to Applications

            ---
            _Auto-generated by GitHub Actions_
          releaseDraft: true
          prerelease: false

      # Manual step to create Portable ZIP for Windows
      - name: Create Portable ZIP (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path "src-tauri/target/release/*" -DestinationPath "MTCode_Portable_x64.zip" -Force
        shell: pwsh

      - name: Upload Portable ZIP
        if: runner.os == 'Windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.release.outputs.upload_url }}
          asset_path: MTCode_Portable_x64.zip
          asset_name: MTCode_v__VERSION___Portable_x64.zip
          asset_content_type: application/zip
        continue-on-error: true
